name: Pipeline Health Checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  # ── Job 1: Python syntax check ────────────────────────────
  syntax-check:
    name: Python Syntax & Imports
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check Python syntax
        run: |
          echo "Checking Python syntax..."
          FAIL=0
          for f in $(find . -name "*.py" \
            -not -path "./.git/*" \
            -not -path "./dbt/*" \
            -not -path "./airflow/logs/*"); do
            if python3 -c "
import ast, sys
try:
    ast.parse(open('$f').read())
    print('  ✓ $f')
except SyntaxError as e:
    print(f'  ✗ $f: {e}')
    sys.exit(1)
" 2>/dev/null; then
              true
            else
              echo "  ✗ SYNTAX ERROR: $f"
              FAIL=$((FAIL+1))
            fi
          done
          if [ $FAIL -gt 0 ]; then
            echo "$FAIL files have syntax errors"
            exit 1
          fi
          echo "All Python files valid"

  # ── Job 2: dbt model file check ───────────────────────────
  dbt-validate:
    name: dbt Model Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check dbt models exist
        run: |
          FAIL=0
          for f in \
            "dbt/dbt_project.yml" \
            "dbt/models/staging/stg_orders.sql" \
            "dbt/models/staging/stg_transactions.sql" \
            "dbt/models/staging/stg_customers.sql" \
            "dbt/models/staging/sources.yml" \
            "dbt/models/intermediate/int_customer_order_metrics.sql" \
            "dbt/models/intermediate/int_customer_transaction_metrics.sql" \
            "dbt/models/marts/mart_customer_360.sql" \
            "dbt/models/marts/mart_daily_order_summary.sql" \
            "dbt/models/marts/mart_fraud_summary.sql"; do
            if [ -f "$f" ]; then
              echo "  ✓ $f"
            else
              echo "  ✗ MISSING: $f"
              FAIL=$((FAIL+1))
            fi
          done
          [ $FAIL -eq 0 ] || exit 1
          echo "All dbt models present"

  # ── Job 3: API validation ─────────────────────────────────
  api-validate:
    name: FastAPI Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install fastapi pydantic pydantic-settings anthropic psycopg2-binary neo4j -q

      - name: Validate API files
        run: |
          python3 - << 'PYEOF'
          import ast, sys, os
          files = [
            'api/main.py',
            'api/core/config.py',
            'api/core/database.py',
            'api/schemas/models.py',
            'api/routers/customers.py',
            'api/routers/orders.py',
            'api/routers/fraud.py',
            'api/routers/entities.py',
            'api/routers/query.py',
          ]
          errors = []
          for f in files:
            if not os.path.exists(f):
              errors.append(f'  ✗ MISSING: {f}')
              continue
            try:
              ast.parse(open(f).read())
              print(f'  ✓ {f}')
            except SyntaxError as e:
              errors.append(f'  ✗ {f}: {e}')
          if errors:
            [print(e) for e in errors]
            sys.exit(1)
          print('All API files valid')
          PYEOF

  # ── Job 4: Project structure ──────────────────────────────
  structure-check:
    name: Project Structure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: List repo structure for debugging
        run: |
          echo "=== Top level ==="
          ls -la
          echo "=== databricks/ ==="
          ls databricks/notebooks/ 2>/dev/null || echo "NOT FOUND"
          echo "=== snowflake/ ==="
          ls snowflake/queries/ 2>/dev/null || echo "NOT FOUND"
          echo "=== neo4j/ ==="
          ls neo4j/queries/ 2>/dev/null || echo "NOT FOUND"
          echo "=== ingestion/ ==="
          ls ingestion/kinesis/ 2>/dev/null || echo "NOT FOUND"
          ls ingestion/lambda/ 2>/dev/null || echo "NOT FOUND"

      - name: Verify pipeline phases
        run: |
          PASS=0; FAIL=0
          check() {
            if [ -f "$1" ] || [ -d "$1" ]; then
              echo "  ✓ $1"; PASS=$((PASS+1))
            else
              echo "  ✗ MISSING: $1"; FAIL=$((FAIL+1))
            fi
          }

          echo "=== Phase 1: Airflow ==="
          check "airflow/dags/project2_master_pipeline.py"

          echo "=== Phase 2: Databricks ==="
          check "databricks/notebooks/orders_bronze_to_silver.py"
          check "databricks/notebooks/transactions_bronze_to_silver.py"
          check "databricks/notebooks/customers_bronze_to_silver.py"
          check "databricks/notebooks/entity_resolution.py"

          echo "=== Phase 3: dbt ==="
          check "dbt/models/marts/mart_customer_360.sql"
          check "infrastructure/scripts/redshift_schema.sql"

          echo "=== Phase 4: Kinesis + Lambda ==="
          check "ingestion/kinesis/producer.py"
          check "ingestion/lambda/s3_trigger.py"

          echo "=== Phase 5: Snowflake ==="
          check "snowflake/queries/01_setup.sql"

          echo "=== Phase 6: Neo4j ==="
          check "neo4j/queries/01_schema.cypher"
          check "neo4j/loaders/entity_loader.py"

          echo "=== Phase 7: FastAPI ==="
          check "api/main.py"
          check "api/routers/query.py"

          echo ""
          echo "Result: $PASS passed, $FAIL failed"
          [ $FAIL -eq 0 ] || exit 1
          echo "✅ All pipeline phases verified"
