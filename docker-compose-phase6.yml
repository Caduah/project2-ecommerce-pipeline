version: "3.8"

services:

  neo4j:
    image: neo4j:5.18-community
    ports:
      - "7475:7474"   # Browser UI
      - "7688:7687"   # Bolt protocol (Python driver)
    environment:
      - NEO4J_AUTH=neo4j/project2neo4j
      - NEO4J_PLUGINS=["apoc", "graph-data-science"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*,gds.*
      - NEO4J_dbms_memory_heap_initial__size=512m
      - NEO4J_dbms_memory_heap_max__size=1G
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - ./neo4j/queries:/var/lib/neo4j/import/queries
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:7474"]
      interval: 15s
      timeout: 10s
      retries: 10

  # Seed the graph with sample data for local testing
  graph-seeder:
    image: python:3.11-slim
    depends_on:
      neo4j:
        condition: service_healthy
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=project2neo4j
    volumes:
      - ./neo4j:/app/neo4j
    working_dir: /app
    command: >
      bash -c "
        pip install neo4j -q &&
        python neo4j/loaders/seed_local.py
      "

volumes:
  neo4j_data:
  neo4j_logs:
